services:
  postgres:
    image: postgres:18
    container_name: demo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-demo}
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
