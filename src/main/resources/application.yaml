spring:
  application:
    name: demo
  flyway:
    locations: classpath:db/migrations
    out-of-order: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:demo}}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
management:
  tracing:
    sampling:
          probability: 1.0
  observations:
    http:
      server:
        requests:
          name:
            pattern: "{httpRequestMethod} {httpRoute}"
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://grafana:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://grafana:4318/v1/logs
  otlp:
    metrics:
      export:
        url: http://grafana:4318/v1/metrics
logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${SPRING_LOG_SERVICE_NAME:Demo}
        version: ${SPRING_LOG_VERSION:1}
        environment: ${SPRING_PROFILES_ACTIVE:dev}
        node-name: ${SPRING_LOG_NODE_NAME:primary}
---
spring:
  config:
    activate:
      on-profile: dev
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    path: /v3/api-docs
scalar:
  enabled: true
  path: /scalar
